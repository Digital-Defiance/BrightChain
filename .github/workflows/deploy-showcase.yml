name: Deploy Showcase to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'showcase/**'
      - 'docs/**'
      - '.github/workflows/deploy-showcase.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install showcase dependencies
        run: |
          cd showcase
          yarn install --immutable

      - name: Build showcase (React)
        run: |
          cd showcase
          yarn build

      - name: Setup Ruby for Jekyll
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: docs

      - name: Build Jekyll docs
        run: |
          cd docs
          bundle exec jekyll build --destination _site --baseurl /docs
        env:
          JEKYLL_ENV: production

      - name: Merge docs into showcase dist
        run: |
          mkdir -p ./showcase/dist/docs
          cp -r ./docs/_site/* ./showcase/dist/docs/

      - name: Add CNAME
        run: |
          cp CNAME ./showcase/dist/CNAME

      - name: Fail if docs output is missing
        run: |
          if [ ! -f ./showcase/dist/docs/index.html ]; then
            echo 'Jekyll docs output missing! Build or copy step failed.'
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './showcase/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
