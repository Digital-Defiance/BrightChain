name: Deploy Showcase to GitHub Pages

on:
  push:
    branches: [main, burnbag]
    paths:
      - 'showcase/**'
      - 'docs/**'
      - '.github/workflows/deploy-showcase.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Yarn Berry
        run: |
          corepack enable
          yarn set version 4.14.1

      - name: Restore Yarn cache
        id: yarn-cache
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}

      - name: Install Dependencies
        working-directory: ./showcase
        run: |
          set -e
          yarn config set nodeLinker node-modules
          yarn config set 'npmScopes["awesome.me"].npmRegistryServer'  "https://npm.fontawesome.com/"
          yarn config set 'npmScopes["awesome.me"].npmAlwaysAuth'      true
          yarn config set 'npmScopes["fortawesome"].npmRegistryServer' "https://npm.fontawesome.com/"
          yarn config set 'npmScopes["fortawesome"].npmAlwaysAuth'     true
          yarn config set "npmRegistries[\"https://npm.fontawesome.com/\"].npmAuthToken"  "${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}"
          yarn config set "npmRegistries[\"https://npm.fontawesome.com/\"].npmAlwaysAuth" true

          echo "@fortawesome:registry=https://npm.fontawesome.com/" > .npmrc
          echo "@awesome.me:registry=https://npm.fontawesome.com/" >> .npmrc
          echo "//npm.fontawesome.com/:_authToken=${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}" >> .npmrc
          echo "always-auth=true" >> .npmrc

          mkdir -p .yarn/cache
          yarn install --immutable

      - name: Build showcase (React)
        run: |
          cd showcase
          yarn build
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'
          GENERATE_SOURCEMAP: 'false'
          NODE_ENV: production

      - name: Setup Ruby for Jekyll
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: docs

      - name: Build Jekyll docs
        run: |
          cd docs
          bundle exec jekyll build --destination _site --baseurl /docs
        env:
          JEKYLL_ENV: production

      - name: Merge docs into showcase dist
        run: |
          mkdir -p ./showcase/dist/docs
          cp -r ./docs/_site/* ./showcase/dist/docs/

      - name: Add CNAME
        run: |
          cp CNAME ./showcase/dist/CNAME

      - name: Fail if docs output is missing
        run: |
          if [ ! -f ./showcase/dist/docs/index.html ]; then
            echo 'Jekyll docs output missing! Build or copy step failed.'
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './showcase/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
