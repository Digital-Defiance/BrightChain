name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    env:
      FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Clean build artifacts
        run: |
          rm -rf dist
          rm -rf .cache

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Enable Yarn Berry
        run: |
          corepack enable
          yarn set version 4.14.1

      - name: Restore Yarn cache
        id: yarn-cache
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/global
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Configure registries for CI
        run: |
          # 1. Force Yarn to use the correct settings
          yarn config set 'npmScopes["awesome.me"].npmRegistryServer' "https://npm.fontawesome.com/"
          yarn config set 'npmScopes["awesome.me"].npmAlwaysAuth' true
          yarn config set 'npmScopes["fortawesome"].npmRegistryServer' "https://npm.fontawesome.com/"
          yarn config set 'npmScopes["fortawesome"].npmAlwaysAuth' true
          yarn config set "npmRegistries[\"https://npm.fontawesome.com/\"].npmAuthToken" "${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}"
          yarn config set "npmRegistries[\"https://npm.fontawesome.com/\"].npmAlwaysAuth" true
          yarn config set nodeLinker node-modules

          # 2. CREATE A PHYSICAL .NPMRC (The 'Silver Bullet' for node-modules linker)
          echo "@fortawesome:registry=https://npm.fontawesome.com/" > .npmrc
          echo "@awesome.me:registry=https://npm.fontawesome.com/" >> .npmrc
          echo "//npm.fontawesome.com/:_authToken=${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}" >> .npmrc
          echo "always-auth=true" >> .npmrc

          # COPY it to showcase just in case the linker checks there
          mkdir -p showcase
          cp .npmrc showcase/.npmrc          

      - name: Install dependencies
        run: |
          ./do-yarn.sh --immutable

      - uses: nrwl/nx-set-shas@v4

      # Run lint, test, build, and e2e tasks explicitly
      - name: Run Lint
        run: npx nx run-many --target=lint --all --skip-nx-cache --parallel=3

      - name: Run Tests
        run: npx nx run-many --target=test --all --skip-nx-cache --parallel=3

      - name: Run Build
        run: npx nx run-many --target=build --all --skip-nx-cache --parallel=3

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        run: npx nx run-many --target=e2e --all --skip-nx-cache --parallel=3
        env:
          CI: true
        timeout-minutes: 10

      - name: Upload coverage to Codacy
        run: bash <(curl -Ls https://coverage.codacy.com/get.sh)
