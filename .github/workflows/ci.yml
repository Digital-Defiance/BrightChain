name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    env:
      BRIGHTCHAIN_REGISTRY_TOKEN: ${{ secrets.BRIGHTCHAIN_REGISTRY_TOKEN }}
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Self-Whitelist Runner IP (with Retries)
        run: |
          RUNNER_IP=$(curl -s https://ifconfig.me)
          RESOURCE_ID=$(az containerapp show -n verdaccio-registry -g BrightChain --query id -o tsv)
          
          # Retry loop to handle (ContainerAppOperationInProgress)
          for i in {1..5}; do
            echo "Attempt $i: Whitelisting CI Runner ($RUNNER_IP)..."
            
            az rest --method patch --url "${RESOURCE_ID}?api-version=2023-05-01" --body "{
              \"properties\": {
                \"configuration\": {
                  \"ingress\": {
                    \"external\": true,
                    \"ipSecurityRestrictions\": [
                      { \"name\": \"AllowStephenson\", \"ipAddressRange\": \"67.183.70.240/32\", \"action\": \"Allow\" },
                      { \"name\": \"AllowGitHubRunner\", \"ipAddressRange\": \"$RUNNER_IP/32\", \"action\": \"Allow\" }
                    ]
                  }
                }
              }
            }" && break || echo "Azure is busy, retrying in 30s..."
            
            sleep 30
          done

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Clean build artifacts
        run: |
          rm -rf dist
          rm -rf .cache

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Enable Yarn Berry
        run: |
          corepack enable
          yarn set version 4.10.3

      - name: Restore Yarn cache
        id: yarn-cache
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/global
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Configure registries for CI
        run: |
          # 1. Force Yarn to use the correct settings
          yarn config set 'npmScopes["awesome.me"].npmRegistryServer' "https://verdaccio-registry.nicefield-46a11a16.westus2.azurecontainerapps.io"
          yarn config set 'npmScopes["awesome.me"].npmAlwaysAuth' true
          yarn config set 'npmScopes["fortawesome"].npmRegistryServer' "https://verdaccio-registry.nicefield-46a11a16.westus2.azurecontainerapps.io"
          yarn config set 'npmScopes["fortawesome"].npmAlwaysAuth' true
          yarn config set nodeLinker node-modules
          
          # 2. CREATE A PHYSICAL .NPMRC (The 'Silver Bullet' for node-modules linker)
          # Note: We remove 'https:' from the URL for the config key
          echo "//verdaccio-registry.nicefield-46a11a16.westus2.azurecontainerapps.io/:_auth=${{ secrets.BRIGHTCHAIN_REGISTRY_TOKEN }}" > .npmrc
          echo "always-auth=true" >> .npmrc

          # COPY it to showcase just in case the linker checks there
          mkdir -p showcase
          cp .npmrc showcase/.npmrc          

      - name: Install dependencies
        run: |
          ./do-yarn.sh --immutable

      - uses: nrwl/nx-set-shas@v4

      # Run lint, test, build, and e2e tasks explicitly
      - name: Run Lint
        run: npx nx run-many --target=lint --all --skip-nx-cache --parallel=3

      - name: Run Tests
        run: npx nx run-many --target=test --all --skip-nx-cache --parallel=3

      - name: Run Build
        run: npx nx run-many --target=build --all --skip-nx-cache --parallel=3

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        run: npx nx run-many --target=e2e --all --skip-nx-cache --parallel=3
        env:
          CI: true
        timeout-minutes: 10

      - name: Upload coverage to Codacy
        run: bash <(curl -Ls https://coverage.codacy.com/get.sh)
